name = "ai-xiaoguan-api"
main = "worker/index.js"
compatibility_date = "2024-01-01"

# ===== KV 命名空间（可选，用于持久化限流数据）=====
# 部署前需要在 Cloudflare 控制台创建 KV：
# 1. 进入 Workers & Pages → KV → Create namespace
# 2. 复制命名空间 ID，替换下面的 ID
# [kv_namespaces]
# binding = "RATE_LIMIT_KV"
# id = "你的KV命名空间ID"

[vars]
# 这些环境变量会暴露在代码中，敏感信息不要放这里
# API Key 在 worker/index.js 中直接配置
