name = "ai-xiaoguan-api"
main = "worker/index.js"
compatibility_date = "2024-01-01"

# ===== 自定义域名（解决国内无法访问 workers.dev 的问题）=====
[[routes]]
pattern = "api.54xiaoguan.cn/*"
zone_name = "54xiaoguan.cn"

# ===== KV 命名空间（持久化激活码+限流数据）=====
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "bdc1e6e85624431e9043a34e1486ac8a"

[vars]
# 这些环境变量会暴露在代码中，敏感信息不要放这里
# API Key 在 worker/index.js 中直接配置
